<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Builder</title>

<style>
body { margin:0; font-family:"Segoe UI"; background:#f3f5f9; }

.wrapper { display:grid; grid-template-columns:260px 1fr; height:100vh; }

.sidebar { background:#0f2e5d; color:white; padding:20px; }
.sidebar select { width:100%; padding:8px; margin-bottom:15px; }

.main { padding:20px; overflow:auto; }

.panel {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

img {
    max-width:100%;
    height:120px;
    object-fit:contain;
    display:block;
    margin-top:10px;
}

.btn {
    padding:10px 15px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td { padding:10px; border-bottom:1px solid #eee; }
th { background:#0f2e5d; color:white; }

#debugPanel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:180px;
    background:#111;
    color:#0f0;
    font-size:12px;
    font-family:monospace;
    overflow:auto;
    padding:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h2>Set Builder</h2>

<label>Range</label>
<select id="rangeFilter"></select>

<label>Family</label>
<select id="familyFilter"></select>

<label>Variant</label>
<select id="variantSelect"></select>

<img id="variantImage">

</div>

<div class="main">

<div class="panel">
<h3>Trocars</h3>

<select id="trocar1"></select>
<select id="trocar2"></select>
</div>

<div class="panel">
<h3>Accessories</h3>
<div id="accessories"></div>
</div>

<button class="btn" onclick="addToSet()">Add to Set</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessories</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<div id="debugPanel"></div>

<script>

let DATA;
let selectedRange, selectedFamily, selectedCannula;
let selectedTrocar1, selectedTrocar2;
let selectedAccessories = [];
let CONFIG = [];

/* DEBUG */
function log(msg, obj=null){
    const p = document.getElementById("debugPanel");
    let text = typeof msg==="string"?msg:JSON.stringify(msg);
    if(obj) text += " → " + JSON.stringify(obj);
    console.log(msg,obj||"");
    p.innerHTML += text + "<br>";
    p.scrollTop = p.scrollHeight;
}

/* INIT */
async function init(){
    try{
        log("Loading JSON...");
        const res = await fetch("./YP.json");
        const text = await res.text();

        if(text.startsWith("<!DOCTYPE")){
            throw "Azure returned HTML!";
        }

        DATA = JSON.parse(text);
        log("JSON loaded", DATA);

        buildRange();

    }catch(e){
        log("ERROR:", e);
        alert("JSON failed");
    }
}

/* RANGE */
function buildRange(){
    const ranges = [...new Set(DATA.cannulas.map(x=>x.range))];
    const sel = document.getElementById("rangeFilter");

    sel.innerHTML = "";

    ranges.forEach(r=>{
        sel.innerHTML += `<option value="${r}">${r}</option>`;
    });

    sel.onchange = ()=>{
        selectedRange = sel.value;
        log("Range selected", selectedRange);
        resetAll();
        buildFamily();
    };

    selectedRange = ranges[0];
    buildFamily();
}

/* FAMILY */
function buildFamily(){
    const sel = document.getElementById("familyFilter");

    const fams = [...new Set(
        DATA.cannulas
        .filter(x=>x.range===selectedRange)
        .map(x=>x.family)
    )];

    sel.innerHTML = "";

    fams.forEach(f=>{
        sel.innerHTML += `<option value="${f}">${f}</option>`;
    });

    sel.onchange = ()=>{
        selectedFamily = sel.value;
        log("Family selected", selectedFamily);
        buildVariants();
        buildTrocars();
        buildAccessories();
    };

    selectedFamily = fams[0];
    buildVariants();
    buildTrocars();
    buildAccessories();
}

/* VARIANTS */
function buildVariants(){
    const sel = document.getElementById("variantSelect");

    const vars = DATA.cannulas.filter(x=>
        x.range===selectedRange &&
        x.family===selectedFamily
    );

    sel.innerHTML = "";

    vars.forEach(v=>{
        sel.innerHTML += `<option value="${v.part_no}">${v.variant}</option>`;
    });

    sel.onchange = ()=>{
        selectedCannula = vars.find(x=>x.part_no===sel.value);
        log("Cannula selected", selectedCannula);

        document.getElementById("variantImage").src =
            selectedCannula.variant_image || "";
    };

    selectedCannula = vars[0];
    if(selectedCannula){
        document.getElementById("variantImage").src =
            selectedCannula.variant_image || "";
    }
}

/* TROCAR */
function buildTrocars(){
    const t1 = document.getElementById("trocar1");
    const t2 = document.getElementById("trocar2");

    const trocars = DATA.trocars.filter(x=>
        x.range===selectedRange &&
        x.family===selectedFamily
    );

    t1.innerHTML = "<option value=''>None</option>";
    t2.innerHTML = "<option value=''>None</option>";

    trocars.forEach(t=>{
        const opt = `<option value="${t.part_no}">${t.variant}</option>`;
        t1.innerHTML += opt;
        t2.innerHTML += opt;
    });

    t1.onchange = ()=> selectedTrocar1 = t1.value;
    t2.onchange = ()=> selectedTrocar2 = t2.value;

    log("Trocars loaded", trocars.length);
}

/* ACCESSORIES */
function buildAccessories(){
    const div = document.getElementById("accessories");
    div.innerHTML = "";
    selectedAccessories = [];

    const acc = DATA.accessories.filter(x=>
        x.range===selectedRange &&
        x.family===selectedFamily
    );

    log("Accessories found", acc.length);

    acc.forEach(a=>{
        const el = document.createElement("div");

        el.innerHTML = `
            <label>
            <input type="checkbox" value="${a.part_no}">
            ${a.variant}
            </label>
        `;

        el.querySelector("input").onchange = (e)=>{
            if(e.target.checked){
                selectedAccessories.push(a);
            }else{
                selectedAccessories =
                    selectedAccessories.filter(x=>x.part_no!==a.part_no);
            }
        };

        div.appendChild(el);
    });
}

/* ADD */
function addToSet(){
    if(!selectedCannula){
        alert("Select cannula");
        return;
    }

    CONFIG.push({
        cannula: selectedCannula,
        trocar1: selectedTrocar1,
        trocar2: selectedTrocar2,
        accessories: [...selectedAccessories]
    });

    log("Added config", CONFIG);

    renderTable();
}

/* TABLE */
function renderTable(){
    const tb = document.getElementById("tableBody");
    tb.innerHTML = "";

    CONFIG.forEach((c,i)=>{
        tb.innerHTML += `
        <tr>
        <td>${i+1}</td>
        <td>${c.cannula.variant}</td>
        <td>${c.trocar1 || ""} ${c.trocar2 || ""}</td>
        <td>${c.accessories.map(a=>a.variant).join(", ")}</td>
        </tr>`;
    });
}

/* RESET */
function resetAll(){
    document.getElementById("variantSelect").innerHTML="";
    document.getElementById("trocar1").innerHTML="";
    document.getElementById("trocar2").innerHTML="";
    document.getElementById("accessories").innerHTML="";
}

/* START */
init();

</script>

</body>
</html>
