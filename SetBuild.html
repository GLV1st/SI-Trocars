<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>
body { margin:0; font-family:"Segoe UI", Arial; background:#f3f5f9; }

.wrapper { display:grid; grid-template-columns:260px 1fr; height:100vh; }

.sidebar { background:#0f2e5d; color:white; padding:20px; }
.sidebar select { width:100%; padding:8px; }

.main { padding:20px; }

.header { display:flex; justify-content:space-between; align-items:center; }

.btn {
    padding:10px 16px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.config-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.panel {
    background:white;
    border-radius:12px;
    padding:15px;
}

.item {
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.item.selected {
    border-color:#0f2e5d;
    background:#eef4ff;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th, td { padding:10px; border-bottom:1px solid #eee; }

th { background:#0f2e5d; color:white; }

.delete-btn { color:red; cursor:pointer; }

/* DEBUG PANEL */
#debugPanel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:180px;
    background:#111;
    color:#0f0;
    font-family:monospace;
    font-size:12px;
    overflow:auto;
    padding:10px;
    z-index:9999;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
    <h2>YelloPort</h2>
    <h3>Family</h3>
    <select id="familyFilter"></select>
</div>

<div class="main">

<div class="header">
    <h2>Set Configurator</h2>
    <button class="btn" onclick="goBack()">Back</button>
</div>

<div class="config-grid">

<div class="panel">
    <h4>1. Select Cannula</h4>
    <div id="cannulaList"></div>
</div>

<div class="panel">
    <h4>2. Select Trocar</h4>
    <div id="trocarList"></div>
</div>

<div class="panel">
    <h4>3. Valve</h4>
    <div id="valveDisplay">Auto (coming later)</div>
</div>

</div>

<button class="btn" onclick="addToSet()" style="margin-top:20px;">
Add to Configuration
</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocar</th>
<th>Codes</th>
<th></th>
</tr>
</thead>
<tbody id="configTable"></tbody>
</table>

<button class="btn" onclick="clearAll()">Clear All</button>

</div>
</div>

<div id="debugPanel"></div>

<script>

let DATA;
let selectedCannula = null;
let selectedTrocar = null;
let CONFIG = [];

/* DEBUG LOGGER */
function log(msg, obj=null) {
    const panel = document.getElementById("debugPanel");

    let text = typeof msg === "string" ? msg : JSON.stringify(msg);

    if (obj) text += " → " + JSON.stringify(obj);

    console.log(msg, obj || "");
    panel.innerHTML += text + "<br>";
    panel.scrollTop = panel.scrollHeight;
}

/* LOAD JSON SAFELY */
async function init() {
    try {
        log("Fetching ./YP.json...");

        const res = await fetch("./YP.json");

        log("Status:", res.status);

        const text = await res.text();

        // Detect Azure returning HTML instead of JSON
        if (text.startsWith("<!DOCTYPE")) {
            throw new Error("Azure returned HTML instead of JSON (routing issue)");
        }

        const json = JSON.parse(text);

        log("JSON parsed OK");

        // NORMALISE DATA
        DATA = {
            cannulas: (json.cannulas || []).map(c => ({
                ...c,
                family: (c.family || "").trim().toLowerCase()
            })),
            trocars: (json.trocars || []).map(t => ({
                ...t,
                family: (t.family || "").trim().toLowerCase()
            }))
        };

        log("Data normalised", DATA);

        buildFamilyFilter();
        buildCannulas();

    } catch (err) {
        log("LOAD ERROR:", err.message);
        alert("JSON failed to load: " + err.message);
    }
}

/* FAMILY FILTER */
function buildFamilyFilter() {
    const select = document.getElementById("familyFilter");

    const families = [...new Set(DATA.cannulas.map(c => c.family))];

    log("Families:", families);

    select.innerHTML = "";

    families.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f.toUpperCase();
        select.appendChild(opt);
    });

    select.onchange = buildCannulas;
}

/* BUILD CANNULAS */
function buildCannulas() {
    const list = document.getElementById("cannulaList");
    list.innerHTML = "";

    const filter = document.getElementById("familyFilter").value;

    const filtered = DATA.cannulas.filter(c =>
        !filter || c.family === filter
    );

    log("Cannulas found:", filtered.length);

    if (!filtered.length) {
        list.innerHTML = "<p>No cannulas</p>";
        return;
    }

    filtered.forEach(c => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<b>${c.variant}</b><br>${c.length}mm`;

        div.onclick = () => {
            selectedCannula = c;
            selectedTrocar = null;

            log("Selected cannula", c);

            selectUI(list, div);
            buildTrocars(c.family);
        };

        list.appendChild(div);
    });
}

/* BUILD TROCAR */
function buildTrocars(family) {
    const list = document.getElementById("trocarList");
    list.innerHTML = "";

    const filtered = DATA.trocars.filter(t =>
        t.family === family
    );

    log("Trocars matched:", filtered.length);

    if (!filtered.length) {
        list.innerHTML = "<p style='color:red;'>No matching trocars</p>";
        return;
    }

    filtered.forEach(t => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<b>${t.name}</b><br>${t.type}`;

        div.onclick = () => {
            selectedTrocar = t;
            log("Selected trocar", t);
            selectUI(list, div);
        };

        list.appendChild(div);
    });
}

/* UI SELECT */
function selectUI(container, element) {
    container.querySelectorAll(".item").forEach(i =>
        i.classList.remove("selected")
    );
    element.classList.add("selected");
}

/* ADD */
function addToSet() {
    if (!selectedCannula || !selectedTrocar) {
        log("Missing selection");
        alert("Select cannula AND trocar");
        return;
    }

    CONFIG.push({
        cannula: selectedCannula,
        trocar: selectedTrocar
    });

    log("Added", CONFIG);

    renderTable();
}

/* TABLE */
function renderTable() {
    const tbody = document.getElementById("configTable");
    tbody.innerHTML = "";

    CONFIG.forEach((item, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${item.cannula.family}</td>
            <td>${item.trocar.name}</td>
            <td>${item.cannula.part_no} / ${item.trocar.part_no}</td>
            <td><span class="delete-btn" onclick="removeItem(${i})">🗑</span></td>
        </tr>`;
    });
}

/* REMOVE */
function removeItem(i) {
    CONFIG.splice(i,1);
    renderTable();
}

/* CLEAR */
function clearAll() {
    CONFIG = [];
    renderTable();
    log("Cleared");
}

/* NAV */
function goBack() {
    window.location.href = "/index.html";
}

init();

</script>

</body>
</html>
