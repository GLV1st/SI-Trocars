<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>
body { margin:0; font-family:"Segoe UI", Arial; background:#f3f5f9; }

.wrapper { display:grid; grid-template-columns:260px 1fr; height:100vh; }

.sidebar { background:#0f2e5d; color:white; padding:20px; }
.sidebar select { width:100%; padding:10px; border-radius:6px; border:none; }

.main { padding:25px; overflow:auto; }

.header { display:flex; justify-content:space-between; align-items:center; }

.btn {
    padding:10px 16px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.config-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.panel {
    background:white;
    border-radius:12px;
    padding:15px;
}

select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* IMAGES */
#cannulaImageBox,
#trocarImageBox {
    margin-top:10px;
    text-align:center;
}

#cannulaImageBox img,
#trocarImageBox img {
    max-height:140px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ddd;
    padding:5px;
    background:white;
}

#valveDisplay {
    margin-top:10px;
    padding:10px;
    background:#eef4ff;
    border-radius:8px;
    text-align:center;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th, td { padding:10px; border-bottom:1px solid #eee; }
th { background:#0f2e5d; color:white; }

.delete-btn { color:red; cursor:pointer; }

/* DEBUG */
#debugPanel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:150px;
    background:#111;
    color:#0f0;
    font-family:monospace;
    font-size:12px;
    overflow:auto;
    padding:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
    <h2>YelloPort</h2>
    <h3>Family</h3>
    <select id="familySelect"></select>
</div>

<div class="main">

<div class="header">
    <h2>Set Configurator</h2>
    <button class="btn" onclick="goBack()">Back</button>
</div>

<div class="config-grid">

<!-- CANNULA -->
<div class="panel">
    <h4>1. Select Cannula</h4>
    <select id="variantSelect" disabled></select>

    <div id="cannulaImageBox">
        <img id="cannulaImage" style="display:none;">
    </div>
</div>

<!-- TROCAR -->
<div class="panel">
    <h4>2. Select Trocars</h4>

    <select id="trocarSelect1" disabled></select>
    <select id="trocarSelect2" disabled></select>

    <div id="trocarImageBox"></div>
</div>

<!-- VALVE -->
<div class="panel">
    <h4>3. Valve</h4>
    <div id="valveDisplay">Select a cannula</div>
</div>

</div>

<button class="btn" onclick="addToSet()" style="margin-top:20px;">
Add to Configuration
</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocars</th>
<th>Codes</th>
<th></th>
</tr>
</thead>
<tbody id="configTable"></tbody>
</table>

<button class="btn" onclick="clearAll()">Clear All</button>

</div>
</div>

<div id="debugPanel"></div>

<script>

let DATA;
let selectedFamily = null;
let selectedVariant = null;
let selectedTrocar1 = null;
let selectedTrocar2 = null;
let CONFIG = [];

/* INIT */
async function init() {
    const res = await fetch("./YP.json");
    const json = await res.json();

    DATA = {
        cannulas: (json.cannulas || []).map(c => ({
            ...c,
            family: (c.family || "").trim().toLowerCase()
        })),
        trocars: (json.trocars || []).map(t => ({
            ...t,
            family: (t.family || "").trim().toLowerCase()
        }))
    };

    buildFamily();
}

/* FAMILY */
function buildFamily() {
    const select = document.getElementById("familySelect");

    const families = [...new Set(DATA.cannulas.map(c => c.family))];

    select.innerHTML = "<option value=''>Select Family</option>";

    families.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f.toUpperCase();
        select.appendChild(opt);
    });

    select.onchange = onFamilyChange;
}

/* FAMILY CHANGE */
function onFamilyChange(e) {
    selectedFamily = e.target.value;
    selectedVariant = null;

    buildVariants();

    variantSelect.disabled = false;
    trocarSelect1.disabled = true;
    trocarSelect2.disabled = true;

    clearImages();
}

/* VARIANTS */
function buildVariants() {
    const variants = [
        ...new Set(
            DATA.cannulas
                .filter(c => c.family === selectedFamily)
                .map(c => c.variant)
        )
    ];

    variantSelect.innerHTML = "<option value=''>Select Variant</option>";

    variants.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        variantSelect.appendChild(opt);
    });

    variantSelect.onchange = onVariantChange;
}

/* VARIANT CHANGE */
function onVariantChange(e) {
    selectedVariant = e.target.value;

    buildTrocars();

    trocarSelect1.disabled = false;
    trocarSelect2.disabled = false;

    // show cannula image
    const cannula = DATA.cannulas.find(c =>
        c.family === selectedFamily &&
        c.variant === selectedVariant
    );

    const img = document.getElementById("cannulaImage");

    if (cannula?.variant_image) {
        img.src = cannula.variant_image;
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }

    updateValve();
}

/* BUILD TROCAR DROPDOWNS */
function buildTrocars() {
    const trocars = DATA.trocars.filter(t =>
        t.family === selectedFamily
    );

    trocarSelect1.innerHTML = "<option value=''>Select Trocar 1</option>";
    trocarSelect2.innerHTML = "<option value=''>Select Trocar 2 (optional)</option>";

    trocars.forEach(t => {
        const opt1 = document.createElement("option");
        opt1.value = t.part_no;
        opt1.textContent = `${t.name} (${t.part_no})`;

        const opt2 = opt1.cloneNode(true);

        trocarSelect1.appendChild(opt1);
        trocarSelect2.appendChild(opt2);
    });

    trocarSelect1.onchange = updateTrocarSelection;
    trocarSelect2.onchange = updateTrocarSelection;
}

/* TROCAR SELECTION */
function updateTrocarSelection() {

    selectedTrocar1 = trocarSelect1.value || null;
    selectedTrocar2 = trocarSelect2.value || null;

    if (selectedTrocar1 && selectedTrocar1 === selectedTrocar2) {
        alert("Trocar 2 must be different");
        trocarSelect2.value = "";
        selectedTrocar2 = null;
    }

    const box = document.getElementById("trocarImageBox");
    box.innerHTML = "";

    [selectedTrocar1, selectedTrocar2].forEach(code => {
        if (!code) return;

        const t = DATA.trocars.find(x => x.part_no === code);

        if (t?.variant_image) {
            const img = document.createElement("img");
            img.src = t.variant_image;
            box.appendChild(img);
        }
    });
}

/* VALVE */
function updateValve() {
    const cannula = DATA.cannulas.find(c =>
        c.family === selectedFamily &&
        c.variant === selectedVariant
    );

    valveDisplay.innerText = cannula?.valve || "Standard Valve";
}

/* ADD */
function addToSet() {

    if (!selectedVariant || !selectedTrocar1) {
        alert("Select at least one trocar");
        return;
    }

    const cannula = DATA.cannulas.find(c =>
        c.family === selectedFamily &&
        c.variant === selectedVariant
    );

    const trocar1 = DATA.trocars.find(t => t.part_no === selectedTrocar1);
    const trocar2 = selectedTrocar2
        ? DATA.trocars.find(t => t.part_no === selectedTrocar2)
        : null;

    CONFIG.push({
        cannula,
        trocar1,
        trocar2
    });

    renderTable();
}

/* TABLE */
function renderTable() {
    const tbody = document.getElementById("configTable");
    tbody.innerHTML = "";

    CONFIG.forEach((item, i) => {

        const trocars = [
            item.trocar1?.name,
            item.trocar2?.name
        ].filter(Boolean).join(" + ");

        const codes = [
            item.cannula.part_no,
            item.trocar1?.part_no,
            item.trocar2?.part_no
        ].filter(Boolean).join(" / ");

        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${item.cannula.family}</td>
            <td>${trocars}</td>
            <td>${codes}</td>
            <td><span class="delete-btn" onclick="removeItem(${i})">🗑</span></td>
        </tr>`;
    });
}

function removeItem(i) {
    CONFIG.splice(i,1);
    renderTable();
}

function clearAll() {
    CONFIG = [];
    renderTable();
}

function clearImages() {
    document.getElementById("cannulaImage").style.display = "none";
    document.getElementById("trocarImageBox").innerHTML = "";
}

function goBack() {
    window.location.href = "/index.html";
}

init();

</script>

</body>
</html>
