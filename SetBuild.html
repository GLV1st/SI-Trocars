<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Configurator</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  z-index:999;
  padding:10px 14px;
  background:#1e293b;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* TOP BAR */
.top-bar{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  margin-bottom:15px;
}

.top-bar div{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  margin-bottom:4px;
  color:#94a3b8;
}

/* SELECTS */
select, button{
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:14px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.2s;
  cursor:pointer;
}

.card:hover{
  background:#334155;
}

.card.selected{
  outline:3px solid #22c55e;
}

.card img{
  max-width:100px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

.card-title{
  font-weight:bold;
  text-align:center;
}

.card-code{
  font-size:12px;
  color:#94a3b8;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{
  background:#1e293b;
}

/* DEBUG */
#debug{
  margin-top:20px;
  background:#020617;
  padding:10px;
  font-size:12px;
  color:#22c55e;
}
</style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="goBack()">← Back to Menu</button>

<h1>Surgical Configurator</h1>

<div class="top-bar">

  <div>
    <label>Selected YelloPort Range</label>
    <select id="rangeSelect"></select>
  </div>

  <div>
    <label>Select Cannula Size</label>
    <select id="familySelect"></select>
  </div>

  <div>
    <label>Select Cannula Variant</label>
    <select id="cannulaSelect"></select>
  </div>

  <div>
    <label>Select Trocar 1</label>
    <select id="trocarSelect"></select>
  </div>

  <div>
    <label>Select Trocar 2</label>
    <select id="trocarSelect2"></select>
  </div>

</div>

<div>
  <button id="hassonBtn" onclick="toggleHasson()" style="display:none;">Toggle Hasson</button>

  <button onclick="clearSelection()" style="
    margin-left:10px;
    background:#ef4444;
    color:#fff;
  ">
    Clear Selection
  </button>
</div>

<div style="text-align:center; margin:20px 0;">
  <button onclick="addConfig()" style="
    width:50%;
    padding:14px;
    font-size:16px;
    background:#22c55e;
    color:#fff;
    border-radius:10px;
    cursor:pointer;
  ">
    Add to List
  </button>
</div>

<div class="grid" id="cards"></div>

<table id="table">
<thead>
<tr>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessory</th>
<th>Codes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="debug"></div>

<script>
let data = {};
let selectedCannula = null;
let selectedTrocars = [];
let selectedValve = null;
let selectedHasson = null;

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

/* DEBUG */
function log(msg){
  document.getElementById("debug").innerHTML += msg + "<br>";
}

/* LOAD */
async function load(){
  log("Loading JSON...");
  try{
    const res = await fetch("YP.json");
    data = await res.json();
    log("Loaded OK");
    initRanges();
  }catch(e){
    log("ERROR: " + e);
  }
}

/* RANGE */
function initRanges(){
  const ranges = [...new Set(data.cannulas.map(x=>x.range))];
  const sel = document.getElementById("rangeSelect");
  sel.innerHTML = `<option>Select Range</option>`;
  ranges.forEach(r=> sel.innerHTML += `<option>${r}</option>`);

  sel.onchange = ()=> initFamilies(sel.value);
}

/* FAMILY */
function initFamilies(range){
  const families = [...new Set(data.cannulas
    .filter(x=>x.range===range)
    .map(x=>x.family))];

  const sel = document.getElementById("familySelect");
  sel.innerHTML = `<option>Select Family</option>`;
  families.forEach(f=> sel.innerHTML += `<option>${f}</option>`);

  sel.onchange = ()=> {
    initCannulas(range, sel.value);
    initTrocars(range, sel.value);
    autoValve(range, sel.value);
  };
}

/* CANNULA */
function initCannulas(range,family){
  const list = data.cannulas.filter(x=>x.range===range && x.family===family);

  const sel = document.getElementById("cannulaSelect");
  sel.innerHTML = `<option>Select Cannula</option>`;
  list.forEach((c,i)=> sel.innerHTML += `<option value="${i}">${c.variant}</option>`);

  sel.onchange = ()=>{
    selectedCannula = list[sel.value];
    renderCards();
    autoValve(range,family);
    updateHassonButton();
  };
}

/* TROCAR */
function initTrocars(range,family){
  const list = data.trocars.filter(x=>x.range===range && x.family===family);

  const sel1 = document.getElementById("trocarSelect");
  const sel2 = document.getElementById("trocarSelect2");

  sel1.innerHTML = `<option>Select Primary Trocar</option>`;
  sel2.innerHTML = `<option>Select Optional Trocar</option>`;

  list.forEach((t,i)=>{
    sel1.innerHTML += `<option value="${i}">${t.variant}</option>`;
    sel2.innerHTML += `<option value="${i}">${t.variant}</option>`;
  });

  sel1.onchange = ()=>{
    const t = list[sel1.value];
    selectedTrocars = t ? [t] : [];
    renderCards();
  };

  sel2.onchange = ()=>{
    const t = list[sel2.value];
    if(!t) return;

    if(selectedTrocars.length === 1){
      selectedTrocars[1] = t;
    } else if(selectedTrocars.length === 0){
      selectedTrocars.push(t);
    }

    renderCards();
  };
}

/* VALVE */
function autoValve(range,family){
  selectedValve = data.accessories.find(x =>
    x.range===range &&
    x.family===family &&
    x.variant==="Valve"
  );
}

/* HASSon */
function toggleHasson(){
  if(!selectedCannula) return;

  if(selectedHasson){
    selectedHasson=null;
  }else{
    selectedHasson = data.accessories.find(x =>
      x.range===selectedCannula.range &&
      x.family===selectedCannula.family &&
      x.variant==="Hasson"
    );
  }
  renderCards();
}

function updateHassonButton(){
  const btn = document.getElementById("hassonBtn");

  if(!selectedCannula){
    btn.style.display = "none";
    return;
  }

  const exists = data.accessories.find(x =>
    x.range===selectedCannula.range &&
    x.family===selectedCannula.family &&
    x.variant==="Hasson"
  );

  btn.style.display = exists ? "inline-block" : "none";
}

/* CLEAR */
function clearSelection(){
  selectedCannula = null;
  selectedTrocars = [];
  selectedValve = null;
  selectedHasson = null;

  document.getElementById("rangeSelect").value = "";
  document.getElementById("familySelect").innerHTML = `<option>Select Family</option>`;
  document.getElementById("cannulaSelect").innerHTML = `<option>Select Cannula</option>`;
  document.getElementById("trocarSelect").innerHTML = `<option>Select Primary Trocar</option>`;
  document.getElementById("trocarSelect2").innerHTML = `<option>Select Optional Trocar</option>`;

  document.getElementById("cards").innerHTML = "";
  document.getElementById("hassonBtn").style.display = "none";

  log("Selection cleared");
}

/* RENDER */
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML="";

  if(selectedCannula){
    c.appendChild(makeCard(selectedCannula));
  }

  selectedTrocars.forEach((t,i)=>{
    const card = makeCard(t,true);
    card.onclick = ()=>{
      selectedTrocars.splice(i,1);
      renderCards();
    };
    c.appendChild(card);
  });

  if(selectedValve){
    c.appendChild(makeCard(selectedValve));
  }

  if(selectedHasson){
    c.appendChild(makeCard(selectedHasson));
  }
}

/* CARD */
function makeCard(item){
  const div = document.createElement("div");
  div.className="card selected";

  div.innerHTML = `
    <img src="${item.variant_image || ''}">
    <div class="card-title">${item.variant}</div>
    <div class="card-code">${item.part_no}</div>
  `;

  return div;
}

/* ADD */
function addConfig(){
  const row = document.createElement("tr");

  const trocarCodes = selectedTrocars.map(t=>t.part_no).join(", ");

  const codes = [
    selectedCannula?.part_no,
    ...selectedTrocars.map(t=>t.part_no),
    selectedValve?.part_no,
    selectedHasson?.part_no
  ].filter(Boolean).join(" / ");

  row.innerHTML = `
    <td>${selectedCannula?.family} - ${selectedCannula?.variant || ""}</td>
    <td>${trocarCodes}</td>
    <td>${selectedHasson ? "Hasson" : "Valve"}</td>
    <td>${codes}</td>
  `;

  document.querySelector("#table tbody").appendChild(row);

  clearSelection();
}

/* INIT */
load();
</script>

</body>
</html>
