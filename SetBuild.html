<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>

/* ================= GLOBAL ================= */
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  color: #0f172a;
}

.container {
  max-width: 1400px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

/* ================= BOX ================= */
.section-box {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
}

/* ================= FORM ================= */
label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
}

/* ================= CARD ================= */
.card {
  display: flex;
  gap: 12px;
  padding: 10px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  background: #f8fafc;
  cursor: pointer;
  margin-bottom: 10px;
}

.card:hover {
  border-color: #2563eb;
}

.card.selected {
  background: #eff6ff;
  border-color: #2563eb;
}

.card-img {
  width: 55px;
  height: 55px;
  object-fit: contain;
}

.card-title {
  font-weight: 600;
  font-size: 14px;
}

.card-code {
  font-size: 12px;
  color: #64748b;
}

.card-meta {
  font-size: 12px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: #1d4ed8;
  color: #fff;
  border: none;
}

/* ================= DEBUG ================= */
#debug {
  margin-top: 20px;
  background: black;
  color: lime;
  padding: 10px;
  font-size: 12px;
  max-height: 200px;
  overflow: auto;
}

</style>
</head>

<body>

<div class="container">

<h2>Set Configurator</h2>

<div class="grid">

<!-- ================= LEFT ================= -->
<div class="section-box">

<label>Range</label>
<select id="rangeSelect"></select>

<label>Family</label>
<select id="familySelect"></select>

<label>Cannula</label>
<select id="cannulaSelect"></select>

<div id="cannulaCard"></div>

<div id="hassonContainer"></div>

</div>

<!-- ================= MIDDLE ================= -->
<div class="section-box">

<label>Trocar</label>
<select id="trocarSelect"></select>

<div id="trocarCard"></div>

</div>

<!-- ================= RIGHT ================= -->
<div class="section-box">

<h3>Review</h3>
<div id="review"></div>

<button onclick="addConfig()">Add to Configuration</button>

</div>

</div>

<div id="debug">Loading JSON...</div>

</div>

<script>

let data;
let selectedCannula = null;
let selectedTrocar = null;
let selectedValve = null;
let selectedHasson = null;

/* ================= LOAD JSON ================= */
fetch('YP.json')
.then(r => r.json())
.then(d => {
  data = d;
  log("JSON Loaded");
  initRanges();
})
.catch(e => log("ERROR: " + e));

/* ================= DEBUG ================= */
function log(msg){
  document.getElementById("debug").innerHTML += "<br>" + msg;
}

/* ================= RANGE ================= */
function initRanges(){
  const ranges = [...new Set(data.cannulas.map(x => x.range))];
  const sel = document.getElementById("rangeSelect");

  sel.innerHTML = `<option value="">Select</option>`;
  ranges.forEach(r => sel.innerHTML += `<option>${r}</option>`);

  sel.onchange = () => initFamilies(sel.value);
}

/* ================= FAMILY ================= */
function initFamilies(range){
  const fams = [...new Set(
    data.cannulas
      .filter(x => x.range === range)
      .map(x => x.family)
  )];

  const sel = document.getElementById("familySelect");
  sel.innerHTML = `<option value="">Select</option>`;
  fams.forEach(f => sel.innerHTML += `<option>${f}</option>`);

  sel.onchange = () => initCannulas(range, sel.value);
}

/* ================= CANNULA ================= */
function initCannulas(range, family){
  const list = data.cannulas.filter(x =>
    x.range === range && x.family === family
  );

  const sel = document.getElementById("cannulaSelect");
  sel.innerHTML = `<option value="">Select</option>`;
  list.forEach((c,i)=> sel.innerHTML += `<option value="${i}">${c.variant}</option>`);

  sel.onchange = () => {
    selectedCannula = list[sel.value];
    renderCannula();
    renderHasson();
    initTrocars(range, family);
    autoSelectValve();
    updateReview();
  };
}

/* ================= CANNULA CARD ================= */
function renderCannula(){
  const c = selectedCannula;
  document.getElementById("cannulaCard").innerHTML = `
    <div class="card selected">
      <img class="card-img" src="${c.variant_image || ''}">
      <div>
        <div class="card-title">${c.family}</div>
        <div class="card-code">${c.part_no}</div>
      </div>
    </div>
  `;
}

/* ================= TROCAR ================= */
function initTrocars(range, family){
  const list = data.trocars.filter(x =>
    x.range === range && x.family === family
  );

  const sel = document.getElementById("trocarSelect");
  sel.innerHTML = `<option value="">Select</option>`;
  list.forEach((t,i)=> sel.innerHTML += `<option value="${i}">${t.variant}</option>`);

  sel.onchange = () => {
    selectedTrocar = list[sel.value];
    renderTrocar();
    updateReview();
  };
}

function renderTrocar(){
  const t = selectedTrocar;
  document.getElementById("trocarCard").innerHTML = `
    <div class="card selected">
      <div>
        <div class="card-title">${t.variant}</div>
        <div class="card-code">${t.part_no}</div>
      </div>
    </div>
  `;
}

/* ================= VALVE AUTO ================= */
function autoSelectValve(){
  selectedValve = data.accessories.find(a =>
    a.family === selectedCannula.family &&
    a.variant === "Valve"
  );
}

/* ================= HASSON OPTIONAL ================= */
function renderHasson(){
  const h = data.accessories.find(a =>
    a.family === selectedCannula.family &&
    a.variant === "Hasson"
  );

  const box = document.getElementById("hassonContainer");
  box.innerHTML = "";

  if(!h) return;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div>
      <div class="card-title">Hasson (Optional)</div>
      <div class="card-code">${h.part_no}</div>
    </div>
  `;

  div.onclick = () => {
    selectedHasson = selectedHasson ? null : h;
    div.classList.toggle("selected");
    updateReview();
  };

  box.appendChild(div);
}

/* ================= REVIEW ================= */
function updateReview(){
  let html = "";

  if(selectedCannula){
    html += `<div class="card">${selectedCannula.part_no}</div>`;
  }

  if(selectedTrocar){
    html += `<div class="card">${selectedTrocar.part_no}</div>`;
  }

  if(selectedValve){
    html += `<div class="card">Valve: ${selectedValve.part_no}</div>`;
  }

  if(selectedHasson){
    html += `<div class="card">Hasson: ${selectedHasson.part_no}</div>`;
  }

  document.getElementById("review").innerHTML = html;
}

/* ================= FINAL ================= */
function addConfig(){
  const codes = [
    selectedCannula?.part_no,
    selectedTrocar?.part_no,
    selectedValve?.part_no
  ];

  if(selectedHasson){
    codes.push(selectedHasson.part_no);
  }

  alert("Added: " + codes.join(" / "));
}

</script>

</body>
</html>
