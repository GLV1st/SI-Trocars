<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>

/* ================= GLOBAL ================= */
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  color: #0f172a;
}

/* ================= LAYOUT ================= */
.container {
  max-width: 1400px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

/* ================= SECTION BOX ================= */
.section-box {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
}

/* ================= HEADINGS ================= */
h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

label {
  font-size: 13px;
  display: block;
  margin-bottom: 6px;
  color: #475569;
}

/* ================= DROPDOWN ================= */
select {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 13px;
  margin-bottom: 12px;
}

/* ================= CARD ================= */
.card {
  display: flex;
  gap: 14px;
  align-items: center;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 12px;
  transition: all 0.15s ease;
  cursor: pointer;
  margin-bottom: 10px;
}

.card:hover {
  border-color: #2563eb;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card.selected {
  border-color: #2563eb;
  background: #eff6ff;
}

.card-img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  border-radius: 6px;
  background: #fff;
  padding: 6px;
  border: 1px solid #e5e7eb;
}

.card-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
}

.card-code {
  font-size: 12px;
  color: #64748b;
}

.card-meta {
  font-size: 12px;
  color: #475569;
}

/* ================= BUTTON ================= */
.btn-primary {
  background: #1d4ed8;
  color: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
}

.btn-primary:hover {
  background: #1e40af;
}

/* ================= DEBUG ================= */
#debug {
  margin-top: 20px;
  font-size: 12px;
  background: #000;
  color: #0f0;
  padding: 10px;
  border-radius: 6px;
  max-height: 200px;
  overflow: auto;
}

</style>
</head>

<body>

<div class="container">

  <h2>Set Configurator</h2>

  <div class="grid">

    <!-- ================= CANNULA ================= -->
    <div class="section-box">
      <h2>1. Select Cannula</h2>

      <label>Select Cannula</label>
      <select id="cannulaSelect"></select>

      <div id="cannulaCards"></div>
    </div>

    <!-- ================= TROCAR ================= -->
    <div class="section-box">
      <h2>2. Select Trocar(s)</h2>

      <label>Trocar 1</label>
      <select id="trocar1"></select>

      <div id="trocarCards"></div>
    </div>

    <!-- ================= REVIEW ================= -->
    <div class="section-box">
      <h2>3. Review</h2>

      <div id="reviewBox"></div>

      <br>
      <button class="btn-primary">Add to Configuration</button>
    </div>

  </div>

  <!-- DEBUG PANEL (KEEP THIS) -->
  <div id="debug">Loading JSON...</div>

</div>

</body>
</html>
