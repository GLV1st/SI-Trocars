<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Configurator</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}

/* BACK BUTTON */
#backBtn{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 14px;
  background:#334155;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* DROPDOWNS */
.top-row{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
}

.top-row div{
  display:flex;
  flex-direction:column;
  font-size:12px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
}

/* ACTION BUTTON ROW */
#actionRow{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

#actionRow button{
  flex:1;
  max-width:250px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:#fff;
  cursor:pointer;
}

/* ADD BUTTON */
.center-btn{
  display:block;
  margin:20px auto;
  width:50%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:14px;
  padding:15px;
  text-align:center;
}

.card img{
  max-width:100px;
  height:80px;
  object-fit:contain;
}

/* TABLE (RESTORED) */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{
  background:#1e293b;
}
</style>
</head>

<body>

<button id="backBtn" onclick="history.back()">← Back</button>

<h1>Surgical Configurator</h1>

<div class="top-row">
  <div>
    <label>Selected YelloPort Range</label>
    <select id="rangeSelect"></select>
  </div>

  <div>
    <label>Select Cannula Size</label>
    <select id="familySelect"></select>
  </div>

  <div>
    <label>Select Cannula Variant</label>
    <select id="cannulaSelect"></select>
  </div>

  <div>
    <label>Select Trocar 1</label>
    <select id="trocarSelect1"></select>
  </div>

  <div>
    <label>Select Trocar 2</label>
    <select id="trocarSelect2"></select>
  </div>
</div>

<!-- ACTION BUTTONS -->
<div id="actionRow">
  <button id="hassonBtn" onclick="toggleHasson()" style="display:none;">
   Add Hasson Adapter
  </button>

  <button id="clearBtn" onclick="clearSelection()">
    Clear Selection
  </button>
</div>

<button class="center-btn" onclick="addConfig()">Add to List</button>

<div class="grid" id="cards"></div>

<!-- ✅ ORIGINAL TABLE STRUCTURE RESTORED -->
<table id="table">
<thead>
<tr>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessory</th>
<th>Codes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let data = {};

let selectedCannula = null;
let selectedTrocar1 = null;
let selectedTrocar2 = null;
let selectedValve = null;
let selectedHasson = null;

/* LOAD */
async function load(){
  const res = await fetch("YP.json");
  data = await res.json();
  initRanges();
}

/* RANGE */
function initRanges(){
  const ranges = [...new Set(data.cannulas.map(x=>x.range))];
  const sel = document.getElementById("rangeSelect");

  sel.innerHTML = `<option>Select Range</option>`;
  ranges.forEach(r=> sel.innerHTML += `<option>${r}</option>`);

  sel.onchange = ()=> initFamilies(sel.value);
}

/* FAMILY */
function initFamilies(range){
  const families = [...new Set(data.cannulas
    .filter(x=>x.range===range)
    .map(x=>x.family))];

  const sel = document.getElementById("familySelect");
  sel.innerHTML = `<option>Select Size</option>`;
  families.forEach(f=> sel.innerHTML += `<option>${f}</option>`);

  sel.onchange = ()=>{
    initCannulas(range, sel.value);
    initTrocars(range, sel.value);

    selectedValve = data.accessories.find(x =>
      x.range===range && x.family===sel.value && x.variant==="Valve"
    );

    const hasHasson = data.accessories.find(x =>
      x.range===range && x.family===sel.value && x.variant==="Hasson"
    );

    const hassonBtn = document.getElementById("hassonBtn");

    if(hasHasson){
      hassonBtn.style.display = "block";
    }else{
      hassonBtn.style.display = "none";
      selectedHasson = null;
    }

    renderCards();
  };
}

/* CANNULA */
function initCannulas(range,family){
  const list = data.cannulas.filter(x=>x.range===range && x.family===family);
  const sel = document.getElementById("cannulaSelect");

  sel.innerHTML = `<option>Select Variant</option>`;
  list.forEach((c,i)=> sel.innerHTML += `<option value="${i}">${c.variant}</option>`);

  sel.onchange = ()=>{
    selectedCannula = list[sel.value];
    renderCards();
  };
}

/* TROCAR */
function initTrocars(range,family){
  const list = data.trocars.filter(x=>x.range===range && x.family===family);

  const sel1 = document.getElementById("trocarSelect1");
  const sel2 = document.getElementById("trocarSelect2");

  sel1.innerHTML = `<option>Select</option>`;
  sel2.innerHTML = `<option>Optional</option>`;

  list.forEach((t,i)=>{
    sel1.innerHTML += `<option value="${i}">${t.variant}</option>`;
    sel2.innerHTML += `<option value="${i}">${t.variant}</option>`;
  });

  sel1.onchange = ()=>{
    selectedTrocar1 = list[sel1.value] || null;
    renderCards();
  };

  sel2.onchange = ()=>{
    selectedTrocar2 = list[sel2.value] || null;
    renderCards();
  };
}

/* HASSON */
function toggleHasson(){
  const range = document.getElementById("rangeSelect").value;
  const family = document.getElementById("familySelect").value;

  if(selectedHasson){
    selectedHasson = null;
  }else{
    selectedHasson = data.accessories.find(x =>
      x.range === range &&
      x.family === family &&
      x.variant === "Hasson"
    );
  }

  renderCards();
}

/* RENDER */
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML="";

  if(selectedCannula) c.appendChild(makeCard(selectedCannula));
  if(selectedTrocar1) c.appendChild(makeCard(selectedTrocar1));
  if(selectedTrocar2) c.appendChild(makeCard(selectedTrocar2));
  if(selectedValve) c.appendChild(makeCard(selectedValve));
  if(selectedHasson) c.appendChild(makeCard(selectedHasson));
}

/* CARD */
function makeCard(item){
  const div = document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <img src="${item.variant_image || ''}">
    <div>${item.variant}</div>
    <div>${item.part_no}</div>
  `;

  return div;
}

/* ADD (RESTORED FORMAT) */
function addConfig(){
  const row = document.createElement("tr");

  const trocarCodes = [
    selectedTrocar1?.part_no,
    selectedTrocar2?.part_no
  ].filter(Boolean).join(", ");

  const codes = [
    selectedCannula?.part_no,
    selectedTrocar1?.part_no,
    selectedTrocar2?.part_no,
    selectedValve?.part_no,
    selectedHasson?.part_no
  ].filter(Boolean).join(" / ");

  row.innerHTML = `
    <td>${selectedCannula?.variant || ""}</td>
    <td>${trocarCodes}</td>
    <td>${selectedHasson ? "Hasson" : "Valve"}</td>
    <td>${codes}</td>
  `;

  document.querySelector("#table tbody").appendChild(row);

  clearSelection();
}

/* CLEAR */
function clearSelection(){
  selectedCannula = null;
  selectedTrocar1 = null;
  selectedTrocar2 = null;
  selectedValve = null;
  selectedHasson = null;

  document.querySelectorAll("select").forEach(s=> s.selectedIndex = 0);

  document.getElementById("cards").innerHTML="";
}

/* INIT */
load();
</script>

</body>
</html>
