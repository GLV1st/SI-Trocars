<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Configurator</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* SELECTS */
select, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:14px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.2s;
  cursor:pointer;
}

.card:hover{
  background:#334155;
}

.card.selected{
  outline:3px solid #22c55e;
}

.card img{
  max-width:100px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

.card-title{
  font-weight:bold;
  text-align:center;
}

.card-code{
  font-size:12px;
  color:#94a3b8;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{
  background:#1e293b;
}

/* DEBUG */
#debug{
  margin-top:20px;
  background:#020617;
  padding:10px;
  font-size:12px;
  color:#22c55e;
}
</style>
</head>

<body>

<h1>Surgical Configurator</h1>

<select id="rangeSelect"></select>
<select id="familySelect"></select>
<select id="cannulaSelect"></select>
<select id="trocarSelect"></select>

<button onclick="toggleHasson()">Toggle Hasson</button>
<button onclick="addConfig()">Add Config</button>

<div class="grid" id="cards"></div>

<table id="table">
<thead>
<tr>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessory</th>
<th>Codes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="debug"></div>

<script>
let data = {};
let selectedCannula = null;
let selectedTrocars = [];
let selectedValve = null;
let selectedHasson = null;

/* DEBUG */
function log(msg){
  document.getElementById("debug").innerHTML += msg + "<br>";
}

/* LOAD JSON */
async function load(){
  log("Loading JSON...");
  try{
    const res = await fetch("YP.json");
    data = await res.json();
    log("Loaded OK");
    initRanges();
  }catch(e){
    log("ERROR: " + e);
  }
}

/* RANGE */
function initRanges(){
  const ranges = [...new Set(data.cannulas.map(x=>x.range))];
  const sel = document.getElementById("rangeSelect");
  sel.innerHTML = `<option>Select Range</option>`;
  ranges.forEach(r=> sel.innerHTML += `<option>${r}</option>`);

  sel.onchange = ()=> initFamilies(sel.value);
}

/* FAMILY */
function initFamilies(range){
  const families = [...new Set(data.cannulas
    .filter(x=>x.range===range)
    .map(x=>x.family))];

  const sel = document.getElementById("familySelect");
  sel.innerHTML = `<option>Select Family</option>`;
  families.forEach(f=> sel.innerHTML += `<option>${f}</option>`);

  sel.onchange = ()=> {
    initCannulas(range, sel.value);
    initTrocars(range, sel.value);
  };
}

/* CANNULA */
function initCannulas(range,family){
  const list = data.cannulas.filter(x=>x.range===range && x.family===family);

  const sel = document.getElementById("cannulaSelect");
  sel.innerHTML = `<option>Select Cannula</option>`;
  list.forEach((c,i)=> sel.innerHTML += `<option value="${i}">${c.variant}</option>`);

  sel.onchange = ()=>{
    selectedCannula = list[sel.value];
    renderCards();
    autoValve(range,family);
  };
}

/* TROCAR */
function initTrocars(range,family){
  const list = data.trocars.filter(x=>x.range===range && x.family===family);

  const sel = document.getElementById("trocarSelect");
  sel.innerHTML = `<option>Add Trocar</option>`;
  list.forEach((t,i)=> sel.innerHTML += `<option value="${i}">${t.variant}</option>`);

  sel.onchange = ()=>{
    const t = list[sel.value];
    if(!t) return;

    if(!selectedTrocars.find(x=>x.part_no===t.part_no)){
      selectedTrocars.push(t);
      renderCards();
    }
  };
}

/* AUTO VALVE */
function autoValve(range,family){
  selectedValve = data.accessories.find(x =>
    x.range===range &&
    x.family===family &&
    x.variant==="Valve"
  );
}

/* HASSOn */
function toggleHasson(){
  if(selectedHasson){
    selectedHasson=null;
  }else{
    selectedHasson = data.accessories.find(x=>x.variant==="Hasson");
  }
  renderCards();
}

/* RENDER */
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML="";

  if(selectedCannula){
    c.appendChild(makeCard(selectedCannula));
  }

  selectedTrocars.forEach((t,i)=>{
    const card = makeCard(t,true);
    card.onclick = ()=>{
      selectedTrocars.splice(i,1);
      renderCards();
    };
    c.appendChild(card);
  });

  if(selectedValve){
    c.appendChild(makeCard(selectedValve));
  }

  if(selectedHasson){
    c.appendChild(makeCard(selectedHasson));
  }
}

/* CARD BUILDER */
function makeCard(item){
  const div = document.createElement("div");
  div.className="card selected";

  div.innerHTML = `
    <img src="${item.variant_image || ''}">
    <div class="card-title">${item.variant}</div>
    <div class="card-code">${item.part_no}</div>
  `;

  return div;
}

/* ADD CONFIG */
function addConfig(){
  const row = document.createElement("tr");

  const trocarCodes = selectedTrocars.map(t=>t.part_no).join(", ");

  const codes = [
    selectedCannula?.part_no,
    ...selectedTrocars.map(t=>t.part_no),
    selectedValve?.part_no,
    selectedHasson?.part_no
  ].filter(Boolean).join(" / ");

  row.innerHTML = `
    <td>${selectedCannula?.variant || ""}</td>
    <td>${trocarCodes}</td>
    <td>${selectedHasson ? "Hasson" : ""}</td>
    <td>${codes}</td>
  `;

  document.querySelector("#table tbody").appendChild(row);
}

/* INIT */
load();
</script>

</body>
</html>
