<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Configurator</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* TOP CONTROLS */
.top-controls{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.top-controls div{
  flex:1;
  display:flex;
  flex-direction:column;
}

.top-controls label{
  font-size:12px;
  margin-bottom:4px;
  color:#94a3b8;
}

.top-controls select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTONS */
button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:14px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.2s;
  cursor:pointer;
}

.card:hover{
  background:#334155;
}

.card.selected{
  outline:3px solid #22c55e;
}

.card img{
  max-width:100px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

.card-title{
  font-weight:bold;
  text-align:center;
}

.card-code{
  font-size:12px;
  color:#94a3b8;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{
  background:#1e293b;
}

/* DEBUG */
#debug{
  margin-top:20px;
  background:#020617;
  padding:10px;
  font-size:12px;
  color:#22c55e;
}
</style>
</head>

<body>

<h1>Surgical Configurator</h1>

<div class="top-controls">
  <div><label>Range</label><select id="rangeSelect"></select></div>
  <div><label>Family</label><select id="familySelect"></select></div>
  <div><label>Cannula</label><select id="cannulaSelect"></select></div>
  <div><label>Trocar 1</label><select id="trocarSelect1"></select></div>
  <div><label>Trocar 2</label><select id="trocarSelect2"></select></div>
</div>

<button onclick="toggleHasson()">Toggle Hasson</button>
<button onclick="addConfig()">Add Config</button>

<div class="grid" id="cards"></div>

<table id="table">
<thead>
<tr>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessory</th>
<th>Codes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="debug"></div>

<script>
let data = {};
let selectedCannula = null;
let selectedTrocars = [];
let selectedValve = null;
let selectedHasson = null;

/* DEBUG */
function log(msg){
  document.getElementById("debug").innerHTML += msg + "<br>";
}

/* LOAD JSON */
async function load(){
  log("Loading JSON...");
  try{
    const res = await fetch("YP.json");
    data = await res.json();
    log("Loaded OK");
    initRanges();
  }catch(e){
    log("ERROR: " + e);
  }
}

/* RANGE */
function initRanges(){
  const ranges = [...new Set(data.cannulas.map(x=>x.range))];
  const sel = document.getElementById("rangeSelect");
  sel.innerHTML = `<option>Select Range</option>`;
  ranges.forEach(r=> sel.innerHTML += `<option>${r}</option>`);

  sel.onchange = ()=> initFamilies(sel.value);
}

/* FAMILY */
function initFamilies(range){
  const families = [...new Set(data.cannulas
    .filter(x=>x.range===range)
    .map(x=>x.family))];

  const sel = document.getElementById("familySelect");
  sel.innerHTML = `<option>Select Family</option>`;
  families.forEach(f=> sel.innerHTML += `<option>${f}</option>`);

  sel.onchange = ()=> {
    initCannulas(range, sel.value);
    initTrocars(range, sel.value);

    // LOAD VALVE IMMEDIATELY
    autoValve(range, sel.value);
    renderCards();
  };
}

/* CANNULA */
function initCannulas(range,family){
  const list = data.cannulas.filter(x=>x.range===range && x.family===family);

  const sel = document.getElementById("cannulaSelect");
  sel.innerHTML = `<option>Select Cannula</option>`;
  list.forEach((c,i)=> sel.innerHTML += `<option value="${i}">${c.variant}</option>`);

  sel.onchange = ()=>{
    selectedCannula = list[sel.value];
    renderCards();
  };
}

/* TROCAR (UPDATED FOR 2 DROPDOWNS) */
function initTrocars(range,family){
  const list = data.trocars.filter(x=>x.range===range && x.family===family);

  const sel1 = document.getElementById("trocarSelect1");
  const sel2 = document.getElementById("trocarSelect2");

  sel1.innerHTML = `<option>Select Primary Trocar</option>`;
  sel2.innerHTML = `<option>Select Optional Trocar</option>`;

  sel2.disabled = true;

  list.forEach((t,i)=>{
    sel1.innerHTML += `<option value="${i}">${t.variant}</option>`;
    sel2.innerHTML += `<option value="${i}">${t.variant}</option>`;
  });

  sel1.onchange = ()=>{
    selectedTrocars = [];
    const t = list[sel1.value];
    if(!t) return;

    selectedTrocars.push(t);
    sel2.disabled = false;
    renderCards();
  };

  sel2.onchange = ()=>{
    const t = list[sel2.value];
    if(!t) return;

    if(!selectedTrocars.find(x=>x.part_no===t.part_no)){
      selectedTrocars.push(t);
      renderCards();
    }
  };
}

/* AUTO VALVE */
function autoValve(range,family){
  selectedValve = data.accessories.find(x =>
    x.range===range &&
    x.family===family &&
    x.variant==="Valve"
  );
}

/* HASSOn */
function toggleHasson(){
  if(selectedHasson){
    selectedHasson=null;
  }else{
    selectedHasson = data.accessories.find(x=>x.variant==="Hasson");
  }
  renderCards();
}

/* RENDER */
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML="";

  if(selectedCannula){
    c.appendChild(makeCard(selectedCannula));
  }

  selectedTrocars.forEach((t,i)=>{
    const card = makeCard(t,true);
    card.onclick = ()=>{
      selectedTrocars.splice(i,1);
      renderCards();
    };
    c.appendChild(card);
  });

  if(selectedValve){
    c.appendChild(makeCard(selectedValve));
  }

  if(selectedHasson){
    c.appendChild(makeCard(selectedHasson));
  }
}

/* CARD BUILDER */
function makeCard(item){
  const div = document.createElement("div");
  div.className="card selected";

  div.innerHTML = `
    <img src="${item.variant_image || ''}">
    <div class="card-title">${item.variant}</div>
    <div class="card-code">${item.part_no}</div>
  `;

  return div;
}

/* RESET */
function resetConfigurator(){
  selectedCannula = null;
  selectedTrocars = [];
  selectedValve = null;
  selectedHasson = null;

  document.getElementById("familySelect").innerHTML = `<option>Select Family</option>`;
  document.getElementById("cannulaSelect").innerHTML = `<option>Select Cannula</option>`;
  document.getElementById("trocarSelect1").innerHTML = `<option>Select Primary Trocar</option>`;
  document.getElementById("trocarSelect2").innerHTML = `<option>Select Optional Trocar</option>`;
  document.getElementById("trocarSelect2").disabled = true;

  document.getElementById("cards").innerHTML = "";
}

/* ADD CONFIG (UNCHANGED STRUCTURE) */
function addConfig(){

  const tbody = document.querySelector("#table tbody");

  if(selectedCannula){
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${selectedCannula.family} - ${selectedCannula.variant}</td>
      <td></td>
      <td></td>
      <td>${selectedCannula.part_no}</td>
    `;
    tbody.appendChild(row);
  }

  selectedTrocars.forEach(t=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td></td>
      <td>${t.variant}</td>
      <td></td>
      <td>${t.part_no}</td>
    `;
    tbody.appendChild(row);
  });

  if(selectedValve){
    const row = document.createElement("tr");
    row.innerHTML = `
      <td></td>
      <td></td>
      <td>${selectedValve.variant}</td>
      <td>${selectedValve.part_no}</td>
    `;
    tbody.appendChild(row);
  }

  if(selectedHasson){
    const row = document.createElement("tr");
    row.innerHTML = `
      <td></td>
      <td></td>
      <td>Hasson</td>
      <td>${selectedHasson.part_no}</td>
    `;
    tbody.appendChild(row);
  }

  const spacer = document.createElement("tr");
  spacer.innerHTML = `<td colspan="4"></td>`;
  tbody.appendChild(spacer);

  resetConfigurator();
}

/* INIT */
load();
</script>

</body>
</html>
