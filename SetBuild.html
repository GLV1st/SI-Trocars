<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>
body {
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f4f6fa;
}

/* LAYOUT */
.wrapper {
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    background:#0f2e5d;
    color:white;
    padding:20px;
}
.sidebar h2 { margin-top:0; }

/* MAIN */
.main {
    padding:20px;
    overflow:auto;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.btn {
    padding:10px 16px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* GRID */
.config-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

/* CARDS */
.card {
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card h4 {
    margin-top:0;
}

/* SELECT */
select {
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:8px;
}

/* ITEM PREVIEW */
.preview {
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:center;
}

.preview img {
    height:60px;
}

.preview small {
    color:#666;
}

/* REVIEW PANEL */
.review {
    border:1px solid #eee;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th {
    background:#0f2e5d;
    color:white;
}

td, th {
    padding:10px;
    border-bottom:1px solid #eee;
}

/* DEBUG */
#debugPanel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:120px;
    background:#111;
    color:#0f0;
    font-family:monospace;
    font-size:12px;
    overflow:auto;
    padding:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
    <h2>YelloPort</h2>
    <select id="familySelect"></select>
</div>

<div class="main">

<div class="header">
    <h2>Set Configurator</h2>
    <button class="btn" onclick="goBack()">Back</button>
</div>

<div class="config-grid">

<!-- CANNULA -->
<div class="card">
    <h4>1. Select Cannula</h4>
    <select id="variantSelect" disabled></select>

    <div id="cannulaPreview"></div>
</div>

<!-- TROCAR -->
<div class="card">
    <h4>2. Select Trocars</h4>

    <label>Trocar 1</label>
    <select id="trocarSelect1" disabled></select>

    <label>Trocar 2 (optional)</label>
    <select id="trocarSelect2" disabled></select>

    <div id="trocarPreview"></div>
</div>

<!-- REVIEW -->
<div class="card">
    <h4>3. Review</h4>

    <div id="reviewPanel"></div>

    <button class="btn" onclick="addToSet()" style="margin-top:10px;width:100%;">
        + Add to Configuration
    </button>
</div>

</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocars</th>
<th>Codes</th>
<th></th>
</tr>
</thead>
<tbody id="configTable"></tbody>
</table>

<button class="btn" onclick="clearAll()">Clear All</button>

</div>
</div>

<div id="debugPanel"></div>

<script>

let DATA;
let selectedFamily=null, selectedVariant=null;
let selectedTrocar1=null, selectedTrocar2=null;
let CONFIG=[];

async function init(){
    const res = await fetch("./YP.json");
    const json = await res.json();

    DATA = {
        cannulas: json.cannulas.map(c => ({
            ...c,
            family:c.family.toLowerCase()
        })),
        trocars: json.trocars.map(t => ({
            ...t,
            family:t.family.toLowerCase()
        }))
    };

    buildFamily();
}

/* FAMILY */
function buildFamily(){
    const f=[...new Set(DATA.cannulas.map(c=>c.family))];
    familySelect.innerHTML="<option>Select Family</option>";

    f.forEach(x=>{
        let o=document.createElement("option");
        o.value=x; o.textContent=x.toUpperCase();
        familySelect.appendChild(o);
    });

    familySelect.onchange=()=>{
        selectedFamily=familySelect.value;
        buildVariants();
    }
}

/* VARIANT */
function buildVariants(){
    const list=DATA.cannulas.filter(c=>c.family===selectedFamily);

    variantSelect.innerHTML="<option>Select Cannula</option>";

    list.forEach(c=>{
        let o=document.createElement("option");
        o.value=c.variant;
        o.textContent=c.variant;
        variantSelect.appendChild(o);
    });

    variantSelect.disabled=false;

    variantSelect.onchange=()=>{
        selectedVariant=variantSelect.value;

        const c=DATA.cannulas.find(x=>x.variant===selectedVariant && x.family===selectedFamily);

        cannulaPreview.innerHTML=`
        <div class="preview">
            <img src="${c.variant_image}">
            <div>
                <b>${c.variant}</b><br>
                <small>${c.part_no}</small>
            </div>
        </div>`;

        buildTrocars();
        updateReview();
    }
}

/* TROCAR */
function buildTrocars(){
    const list=DATA.trocars.filter(t=>t.family===selectedFamily);

    trocarSelect1.innerHTML="<option>Select Trocar 1</option>";
    trocarSelect2.innerHTML="<option>Select Trocar 2</option>";

    list.forEach(t=>{
        let o1=new Option(t.name,t.part_no);
        let o2=new Option(t.name,t.part_no);
        trocarSelect1.add(o1);
        trocarSelect2.add(o2);
    });

    trocarSelect1.disabled=false;
    trocarSelect2.disabled=false;

    trocarSelect1.onchange=updateTrocar;
    trocarSelect2.onchange=updateTrocar;
}

function updateTrocar(){
    selectedTrocar1=trocarSelect1.value;
    selectedTrocar2=trocarSelect2.value;

    trocarPreview.innerHTML="";

    [selectedTrocar1, selectedTrocar2].forEach(code=>{
        if(!code) return;
        const t=DATA.trocars.find(x=>x.part_no===code);

        trocarPreview.innerHTML+=`
        <div class="preview">
            <img src="${t.variant_image}">
            <div>
                <b>${t.name}</b><br>
                <small>${t.part_no}</small>
            </div>
        </div>`;
    });

    updateReview();
}

/* REVIEW */
function updateReview(){
    if(!selectedVariant) return;

    const c=DATA.cannulas.find(x=>x.variant===selectedVariant && x.family===selectedFamily);

    reviewPanel.innerHTML=`
    <div class="review">
        <b>${c.variant}</b><br>
        ${c.part_no}
    </div>`;
}

/* ADD */
function addToSet(){
    if(!selectedTrocar1) return alert("Select trocar");

    const c=DATA.cannulas.find(x=>x.variant===selectedVariant && x.family===selectedFamily);

    CONFIG.push({
        cannula:c,
        t1:selectedTrocar1,
        t2:selectedTrocar2
    });

    renderTable();
}

/* TABLE */
function renderTable(){
    configTable.innerHTML="";

    CONFIG.forEach((x,i)=>{
        const codes=[x.cannula.part_no,x.t1,x.t2].filter(Boolean).join(" / ");

        configTable.innerHTML+=`
        <tr>
            <td>${i+1}</td>
            <td>${x.cannula.variant}</td>
            <td>${[x.t1,x.t2].filter(Boolean).join(" + ")}</td>
            <td>${codes}</td>
            <td onclick="removeItem(${i})">🗑</td>
        </tr>`;
    });
}

function removeItem(i){CONFIG.splice(i,1);renderTable();}
function clearAll(){CONFIG=[];renderTable();}
function goBack(){window.location.href="/index.html";}

init();

</script>

</body>
</html>
