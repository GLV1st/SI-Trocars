<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YelloPort Set Builder</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#ffffff;
  color:#0f172a;
  margin:0;
  padding:20px;
}

/* BACK BUTTON */
#backBtn{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 14px;
  background:#1F8A86;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
  color:#1F8A86;
}

/* DROPDOWNS */
.top-row{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
}

.top-row div{
  display:flex;
  flex-direction:column;
  font-size:12px;
}

select{
  padding:10px;
  border-radius:8px;
  border:2px solid #1F8A86;
}

/* ACTION ROW */
#actionRow{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

#actionRow button{
  flex:1;
  max-width:250px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1F8A86;
  color:#fff;
  cursor:pointer;
}

/* ADD BUTTON */
.center-btn{
  display:block;
  margin:20px auto;
  width:50%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1F8A86;
  color:#fff;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  margin-top:15px;
}

.card{
  background:#f1f5f9;
  border-radius:14px;
  padding:15px;
  text-align:center;
  border:1px solid #e2e8f0;
}

.card img{
  max-width:100px;
  height:80px;
  object-fit:contain;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th{
  background:#1F8A86;
  color:#fff;
}

td{
  border:1px solid #e2e8f0;
  padding:10px;
}

td img{
  width:80px;
  height:50px;
  object-fit:contain;
  display:block;
  margin:auto;
}

.remove-btn{
  background:red;
  color:#fff;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

/* EXPORT BUTTONS UNDER TABLE */
.export-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.export-row button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1F8A86;
  color:#fff;
}
</style>
</head>

<body>

<button id="backBtn" onclick="history.back()">← Back</button>

<h1>YelloPort Set Builder</h1>

<div class="top-row">
<select id="rangeSelect"></select>
<select id="familySelect"></select>
<select id="cannulaSelect"></select>
<select id="trocarSelect1"></select>
<select id="trocarSelect2"></select>
</div>

<div id="actionRow">
<button id="hassonBtn" onclick="toggleHasson()" style="display:none;">Toggle Hasson</button>
<button onclick="clearSelection()">Clear Selection</button>
</div>

<button class="center-btn" onclick="addConfig()">Add to List</button>

<div class="grid" id="cards"></div>

<table id="table">
<thead>
<tr>
<th>Type</th>
<th>Image</th>
<th>Description</th>
<th>Part Number</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- EXPORT BUTTONS UNDER TABLE -->
<div class="export-row">
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="emailList()">Email</button>
</div>

<script>
let data = {};
let selectedCannula=null, selectedTrocar1=null, selectedTrocar2=null, selectedValve=null, selectedHasson=null;

async function load(){
  const res = await fetch("YP.json");
  data = await res.json();
  initRanges();
}

function initRanges(){
  const sel = rangeSelect;
  const ranges = [...new Set(data.cannulas.map(x=>x.range))];
  sel.innerHTML = `<option>Select Range</option>`;
  ranges.forEach(r=> sel.innerHTML+=`<option>${r}</option>`);
  sel.onchange = ()=> initFamilies(sel.value);
}

function initFamilies(range){
  const sel = familySelect;
  const families=[...new Set(data.cannulas.filter(x=>x.range===range).map(x=>x.family))];
  sel.innerHTML=`<option>Select Size</option>`;
  families.forEach(f=> sel.innerHTML+=`<option>${f}</option>`);

  sel.onchange=()=>{
    initCannulas(range,sel.value);
    initTrocars(range,sel.value);

    selectedValve = data.accessories.find(x=>x.range===range && x.family===sel.value && x.variant==="Valve");

    const hasH = data.accessories.find(x=>x.range===range && x.family===sel.value && x.variant==="Hasson");
    hassonBtn.style.display = hasH ? "block":"none";
    if(!hasH) selectedHasson=null;

    renderCards();
  };
}

function initCannulas(range,family){
  const list=data.cannulas.filter(x=>x.range===range && x.family===family);
  cannulaSelect.innerHTML=`<option>Select Variant</option>`;
  list.forEach((c,i)=> cannulaSelect.innerHTML+=`<option value="${i}">${c.variant}</option>`);
  cannulaSelect.onchange=()=>{selectedCannula=list[cannulaSelect.value];renderCards();};
}

function initTrocars(range,family){
  const list=data.trocars.filter(x=>x.range===range && x.family===family);

  trocarSelect1.innerHTML=`<option>Select</option>`;
  trocarSelect2.innerHTML=`<option>Optional</option>`;

  list.forEach((t,i)=>{
    trocarSelect1.innerHTML+=`<option value="${i}">${t.variant}</option>`;
    trocarSelect2.innerHTML+=`<option value="${i}">${t.variant}</option>`;
  });

  trocarSelect1.onchange=()=>{selectedTrocar1=list[trocarSelect1.value];renderCards();};
  trocarSelect2.onchange=()=>{selectedTrocar2=list[trocarSelect2.value];renderCards();};
}

function toggleHasson(){
  selectedHasson = selectedHasson ? null :
  data.accessories.find(x=>x.range===rangeSelect.value && x.family===familySelect.value && x.variant==="Hasson");
  renderCards();
}

function renderCards(){
  cards.innerHTML="";
  [selectedCannula,selectedTrocar1,selectedTrocar2,selectedValve,selectedHasson]
  .filter(Boolean)
  .forEach(i=>cards.appendChild(makeCard(i)));
}

function makeCard(i){
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<img src="${i.variant_image||''}"><div>${i.variant}</div><div>${i.part_no}</div>`;
  return d;
}

function addConfig(){
  const tbody=document.querySelector("#table tbody");

  function addRow(type,name,code,img){
    const r=document.createElement("tr");
    r.innerHTML=`
      <td>${type}</td>
      <td><img src="${img||''}"></td>
      <td>${name}</td>
      <td>${code}</td>
      <td><button class="remove-btn" onclick="this.closest('tr').remove()">X</button></td>`;
    tbody.appendChild(r);
  }

  if(selectedCannula) addRow("Cannula",`${selectedCannula.family} - ${selectedCannula.variant}`,selectedCannula.part_no,selectedCannula.variant_image);
  if(selectedTrocar1) addRow("Trocar",selectedTrocar1.variant,selectedTrocar1.part_no,selectedTrocar1.variant_image);
  if(selectedTrocar2) addRow("Trocar",selectedTrocar2.variant,selectedTrocar2.part_no,selectedTrocar2.variant_image);
  if(selectedValve) addRow("Accessory","Valve",selectedValve.part_no,selectedValve.variant_image);
  if(selectedHasson) addRow("Accessory","Hasson",selectedHasson.part_no,selectedHasson.variant_image);

  clearSelection();
}

function clearSelection(){
  selectedCannula=selectedTrocar1=selectedTrocar2=selectedValve=selectedHasson=null;
  document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);
  cards.innerHTML="";
}

/* PDF */
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setTextColor(31,138,134);
  doc.setFontSize(20);
  doc.text("YelloPort Set Build",105,20,{align:"center"});

  let rows=[];
  document.querySelectorAll("#table tbody tr").forEach(r=>{
    const c=r.querySelectorAll("td");
    if(c.length<4) return;
    rows.push([c[0].innerText,c[2].innerText,c[3].innerText]);
  });

  doc.autoTable({
    startY:30,
    head:[["Type","Description","Part Number"]],
    body:rows,
    headStyles:{fillColor:[31,138,134]}
  });

  doc.save("YelloPort_Set.pdf");
}

/* EMAIL */
function emailList(){
  let html = `<h2 style="color:#1F8A86;">YelloPort Set Build</h2>
  <table border="1" cellpadding="6" style="border-collapse:collapse;">
  <tr style="background:#1F8A86;color:#fff;">
  <th>Type</th><th>Description</th><th>Code</th></tr>`;

  document.querySelectorAll("#table tbody tr").forEach(r=>{
    const c=r.querySelectorAll("td");
    if(c.length<4) return;
    html+=`<tr><td>${c[0].innerText}</td><td>${c[2].innerText}</td><td>${c[3].innerText}</td></tr>`;
  });

  html+=`</table>`;

  window.location.href=`mailto:?subject=YelloPort Set Build&body=${encodeURIComponent(html)}`;
}

load();
</script>

</body>
</html>
