<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Configurator</title>

<style>
body { margin:0; font-family:"Segoe UI", Arial; background:#f3f5f9; }

.wrapper { display:grid; grid-template-columns:260px 1fr; height:100vh; }

.sidebar { background:#0f2e5d; color:white; padding:20px; }
.sidebar select { width:100%; padding:10px; border-radius:6px; border:none; }

.main { padding:25px; overflow:auto; }

.header { display:flex; justify-content:space-between; align-items:center; }

.btn {
    padding:10px 16px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.config-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.panel {
    background:white;
    border-radius:12px;
    padding:15px;
}

select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

#valveDisplay {
    margin-top:10px;
    padding:10px;
    background:#eef4ff;
    border-radius:8px;
    text-align:center;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th, td { padding:10px; border-bottom:1px solid #eee; }

th { background:#0f2e5d; color:white; }

.delete-btn { color:red; cursor:pointer; }

/* DEBUG PANEL */
#debugPanel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:160px;
    background:#111;
    color:#0f0;
    font-family:monospace;
    font-size:12px;
    overflow:auto;
    padding:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
    <h2>YelloPort</h2>
    <h3>Family</h3>
    <select id="familySelect"></select>
</div>

<div class="main">

<div class="header">
    <h2>Set Configurator</h2>
    <button class="btn" onclick="goBack()">Back</button>
</div>

<div class="config-grid">

<div class="panel">
    <h4>1. Select Cannula</h4>
    <select id="variantSelect" disabled></select>
</div>

<div class="panel">
    <h4>2. Select Trocars (max 2)</h4>
    <select id="trocarSelect" multiple size="6" disabled></select>
</div>

<div class="panel">
    <h4>3. Valve</h4>
    <div id="valveDisplay">Select a cannula</div>
</div>

</div>

<button class="btn" onclick="addToSet()" style="margin-top:20px;">
Add to Configuration
</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocar</th>
<th>Codes</th>
<th></th>
</tr>
</thead>
<tbody id="configTable"></tbody>
</table>

<button class="btn" onclick="clearAll()">Clear All</button>

</div>
</div>

<div id="debugPanel"></div>

<script>

let DATA;
let selectedFamily = null;
let selectedVariant = null;
let selectedTrocars = [];
let CONFIG = [];

/* DEBUG */
function log(msg, obj=null) {
    const panel = document.getElementById("debugPanel");
    let text = typeof msg === "string" ? msg : JSON.stringify(msg);
    if (obj) text += " → " + JSON.stringify(obj);
    panel.innerHTML += text + "<br>";
}

/* INIT */
async function init() {
    const res = await fetch("./YP.json");
    const json = await res.json();

    DATA = {
        cannulas: (json.cannulas || []).map(c => ({
            ...c,
            family: (c.family || "").trim().toLowerCase()
        })),
        trocars: (json.trocars || []).map(t => ({
            ...t,
            family: (t.family || "").trim().toLowerCase()
        }))
    };

    buildFamily();
}

/* FAMILY */
function buildFamily() {
    const select = document.getElementById("familySelect");

    const families = [...new Set(DATA.cannulas.map(c => c.family))];

    select.innerHTML = "<option value=''>Select Family</option>";

    families.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f.toUpperCase();
        select.appendChild(opt);
    });

    select.onchange = onFamilyChange;
}

/* FAMILY CHANGE */
function onFamilyChange(e) {
    selectedFamily = e.target.value;
    selectedVariant = null;
    selectedTrocars = [];

    buildVariants();

    document.getElementById("variantSelect").disabled = false;
    document.getElementById("trocarSelect").disabled = true;

    updateValve();
}

/* VARIANTS */
function buildVariants() {
    const variants = [
        ...new Set(
            DATA.cannulas
                .filter(c => c.family === selectedFamily)
                .map(c => c.variant)
        )
    ];

    const select = document.getElementById("variantSelect");

    select.innerHTML = "<option value=''>Select Variant</option>";

    variants.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
    });

    select.onchange = onVariantChange;
}

/* VARIANT CHANGE */
function onVariantChange(e) {
    selectedVariant = e.target.value;
    selectedTrocars = [];

    buildTrocars();

    document.getElementById("trocarSelect").disabled = false;

    updateValve();
}

/* TROCAR */
function buildTrocars() {
    const trocars = DATA.trocars.filter(t =>
        t.family === selectedFamily
    );

    const select = document.getElementById("trocarSelect");
    select.innerHTML = "";

    trocars.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.part_no;
        opt.textContent = `${t.name} (${t.part_no})`;
        select.appendChild(opt);
    });

    select.onchange = onTrocarChange;
}

/* TROCAR CHANGE */
function onTrocarChange(e) {
    const selected = Array.from(e.target.selectedOptions);

    if (selected.length > 2) {
        selected[selected.length - 1].selected = false;
        alert("Max 2 trocars");
        return;
    }

    selectedTrocars = selected.map(o => o.value);
}

/* VALVE */
function updateValve() {
    if (!selectedFamily || !selectedVariant) {
        valveDisplay.innerText = "Select a cannula";
        return;
    }

    const cannula = DATA.cannulas.find(c =>
        c.family === selectedFamily &&
        c.variant === selectedVariant
    );

    valveDisplay.innerText = cannula?.valve || "Standard Valve";
}

/* ADD */
function addToSet() {
    if (!selectedVariant || !selectedTrocars.length) {
        alert("Complete selection first");
        return;
    }

    const cannula = DATA.cannulas.find(c =>
        c.family === selectedFamily &&
        c.variant === selectedVariant
    );

    selectedTrocars.forEach(code => {
        const trocar = DATA.trocars.find(t => t.part_no === code);

        CONFIG.push({ cannula, trocar });
    });

    renderTable();
}

/* TABLE */
function renderTable() {
    const tbody = document.getElementById("configTable");
    tbody.innerHTML = "";

    CONFIG.forEach((item, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${item.cannula.family}</td>
            <td>${item.trocar.name}</td>
            <td>${item.cannula.part_no} / ${item.trocar.part_no}</td>
            <td><span class="delete-btn" onclick="removeItem(${i})">🗑</span></td>
        </tr>`;
    });
}

/* REMOVE */
function removeItem(i) {
    CONFIG.splice(i,1);
    renderTable();
}

/* CLEAR */
function clearAll() {
    CONFIG = [];
    renderTable();
}

/* NAV */
function goBack() {
    window.location.href = "/index.html";
}

init();

</script>

</body>
</html>
