<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Builder</title>

<style>
body { margin:0; font-family:Segoe UI, Arial; background:#f4f6fa; }

.wrapper { display:grid; grid-template-columns:220px 1fr; height:100vh; }

.sidebar {
    background:#0f2e5d;
    color:white;
    padding:20px;
}

.sidebar select {
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
}

.main { padding:20px; overflow:auto; }

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn {
    padding:10px 16px;
    background:#0f2e5d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.card {
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

select {
    width:100%;
    padding:10px;
    margin-top:8px;
}

/* PREVIEW */
.preview {
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:center;
}

.preview img {
    height:60px;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th {
    background:#0f2e5d;
    color:white;
}

td, th {
    padding:10px;
    border-bottom:1px solid #eee;
}

.delete-btn { cursor:pointer; color:red; }
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
    <h2>YelloPort</h2>
    <h4>Family</h4>
    <select id="familySelect"></select>
</div>

<div class="main">

<div class="header">
    <h2>Set Builder</h2>
    <button class="btn" onclick="goBack()">Back</button>
</div>

<div class="grid">

<!-- CANNULA -->
<div class="card">
    <h4>1. Cannula</h4>
    <select id="variantSelect" disabled></select>
    <div id="cannulaPreview"></div>
</div>

<!-- TROCARS -->
<div class="card">
    <h4>2. Trocars</h4>

    <select id="trocar1" disabled></select>
    <select id="trocar2" disabled></select>

    <div id="trocarPreview"></div>
</div>

<!-- ACCESSORIES -->
<div class="card">
    <h4>3. Accessories</h4>

    <div id="accessoryPreview"></div>

    <button class="btn" style="margin-top:10px;width:100%;" onclick="addToSet()">
        + Add Set
    </button>
</div>

</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Cannula</th>
<th>Trocars</th>
<th>Accessories</th>
<th>Codes</th>
<th></th>
</tr>
</thead>
<tbody id="configTable"></tbody>
</table>

<button class="btn" onclick="clearAll()">Clear All</button>

</div>
</div>

<script>

let DATA;
let selectedFamily=null;
let selectedVariant=null;
let selectedTrocar1=null;
let selectedTrocar2=null;
let CONFIG=[];

/* LOAD */
async function init(){
    const res = await fetch("./YP.json");
    DATA = await res.json();

    buildFamilies();
}

/* FAMILY */
function buildFamilies(){
    const families = [...new Set(DATA.cannulas.map(c=>c.family))];

    familySelect.innerHTML="<option>Select Family</option>";

    families.forEach(f=>{
        const o=new Option(f,f);
        familySelect.add(o);
    });

    familySelect.onchange=()=>{
        selectedFamily=familySelect.value;
        buildVariants();
    }
}

/* VARIANT */
function buildVariants(){
    const list = DATA.cannulas.filter(c=>c.family===selectedFamily);

    variantSelect.innerHTML="<option>Select Variant</option>";

    list.forEach(c=>{
        const o=new Option(c.variant,c.variant);
        variantSelect.add(o);
    });

    variantSelect.disabled=false;

    variantSelect.onchange=()=>{
        selectedVariant=variantSelect.value;

        const c = DATA.cannulas.find(x=>x.family===selectedFamily && x.variant===selectedVariant);

        cannulaPreview.innerHTML=`
        <div class="preview">
            <img src="${c.variant_image}">
            <div>${c.variant}<br><small>${c.part_no}</small></div>
        </div>`;

        buildTrocars();
        loadAccessories();
    }
}

/* TROCAR */
function buildTrocars(){
    const list = DATA.trocars.filter(t=>t.family===selectedFamily);

    trocar1.innerHTML="<option>Trocar 1</option>";
    trocar2.innerHTML="<option>Trocar 2 (optional)</option>";

    list.forEach(t=>{
        trocar1.add(new Option(t.variant, t.part_no));
        trocar2.add(new Option(t.variant, t.part_no));
    });

    trocar1.disabled=false;
    trocar2.disabled=false;

    trocar1.onchange=updateTrocar;
    trocar2.onchange=updateTrocar;
}

function updateTrocar(){
    selectedTrocar1=trocar1.value;
    selectedTrocar2=trocar2.value;

    if(selectedTrocar1 && selectedTrocar1===selectedTrocar2){
        alert("Duplicate trocar");
        trocar2.value="";
        selectedTrocar2=null;
    }

    trocarPreview.innerHTML="";

    [selectedTrocar1,selectedTrocar2].forEach(code=>{
        if(!code) return;
        const t=DATA.trocars.find(x=>x.part_no===code);

        trocarPreview.innerHTML+=`
        <div class="preview">
            <img src="${t.variant_image}">
            <div>${t.variant}<br><small>${t.part_no}</small></div>
        </div>`;
    });
}

/* ACCESSORIES */
function loadAccessories(){
    const list = DATA.accessories.filter(a=>a.family===selectedFamily);

    accessoryPreview.innerHTML="";

    list.forEach(a=>{
        accessoryPreview.innerHTML+=`
        <div class="preview">
            <img src="${a.variant_image}">
            <div>${a.variant}<br><small>${a.part_no}</small></div>
        </div>`;
    });
}

/* ADD */
function addToSet(){
    if(!selectedVariant || !selectedTrocar1){
        alert("Select cannula + trocar");
        return;
    }

    const c = DATA.cannulas.find(x=>x.family===selectedFamily && x.variant===selectedVariant);

    const accessories = DATA.accessories
        .filter(a=>a.family===selectedFamily)
        .map(a=>a.part_no);

    CONFIG.push({
        cannula:c,
        t1:selectedTrocar1,
        t2:selectedTrocar2,
        accessories
    });

    renderTable();
}

/* TABLE */
function renderTable(){
    configTable.innerHTML="";

    CONFIG.forEach((x,i)=>{
        const codes=[
            x.cannula.part_no,
            x.t1,
            x.t2,
            ...x.accessories
        ].filter(Boolean).join(" / ");

        configTable.innerHTML+=`
        <tr>
            <td>${i+1}</td>
            <td>${x.cannula.variant}</td>
            <td>${[x.t1,x.t2].filter(Boolean).join(" + ")}</td>
            <td>${x.accessories.join(" + ")}</td>
            <td>${codes}</td>
            <td class="delete-btn" onclick="removeItem(${i})">🗑</td>
        </tr>`;
    });
}

function removeItem(i){CONFIG.splice(i,1);renderTable();}
function clearAll(){CONFIG=[];renderTable();}
function goBack(){window.location.href="/index.html";}

init();

</script>

</body>
</html>
