<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Surgical Catalogue</title>

<style>
body {
font-family: Arial, Helvetica, sans-serif;
background: #f6f8fa;
margin: 0;
padding: 20px;
}

/* HEADER */
#rangeSelectorHeader {
text-align: center;
font-size: 28px;
font-weight: bold;
margin-bottom: 20px;
color: #0077cc;
}

/* RANGE CARDS */
#rangeSelector {
display: flex;
justify-content: center;
gap: 30px;
margin-bottom: 30px;
flex-wrap: wrap;
}

.rangeCard {
cursor: pointer;
background: #fff;
border-radius: 14px;
padding: 20px;
text-align: center;
transition: 0.2s ease;
border: 2px solid transparent;
}

.rangeCard:hover {
border-color: #0077cc;
transform: scale(1.05);
}

.rangeCard img {
max-height: 180px;
object-fit: contain;
}

/* MAIN */
#catalogue { display: none; }

#backBtn {
margin-bottom: 20px;
padding: 12px 24px;
font-size: 18px;
cursor: pointer;
background: #fff;
border: 1px solid #ccc;
border-radius: 6px;
}

/* BUILDER */
#controls {
text-align: center;
background: #fff;
padding: 20px;
border-radius: 12px;
max-width: 600px;
margin: auto;
}

h3 {
margin-top: 20px;
margin-bottom: 8px;
color: #333;
}

select {
padding: 10px;
font-size: 16px;
width: 100%;
max-width: 400px;
}

/* ACCESSORIES BOX */
#accessoriesBox {
margin-top: 10px;
padding: 15px;
background: #f1f5f9;
border-radius: 8px;
}

/* SUMMARY */
#selectionSummary {
margin-top: 25px;
padding: 15px;
background: #fff;
border-radius: 10px;
text-align: center;
font-size: 16px;
max-width: 600px;
margin-left: auto;
margin-right: auto;
}

/* 🔥 HIDE TABLES (DEBUG SAFE) */
#familyImage,
table {
display: none !important;
}
</style>
</head>

<body>

<h1 id="rangeSelectorHeader">Select Your Product Family</h1>

<div id="rangeSelector"></div>

<div id="catalogue">
<button id="backBtn">← Back</button>

<div id="controls">

<h3>1. Select Cannula Family</h3>
<select id="familyDropdown"></select>

<h3>2. Select Variant</h3>
<select id="variantDropdown" disabled></select>

<h3>3. Select Trocar(s)</h3>
<select id="trocarDropdown" multiple size="6" disabled></select>

<h3>4. Accessories</h3>
<div id="accessoriesBox">Select a cannula to view accessories</div>

</div>

<div id="selectionSummary"></div>

</div>

<script>

/* ================= GLOBAL ================= */
let DATA = {};
let activeRange = null;

let selectedFamily = null;
let selectedVariant = null;
let selectedTrocars = [];

/* ================= LOAD ================= */
async function loadData() {
    const res = await fetch("YP.json");
    const json = await res.json();

    DATA = {
        YelloPort: {
            primary: json.cannulas || [],
            secondary: json.trocars || []
        }
    };

    initUI();
}

/* ================= UI ================= */
function initUI() {
    const container = document.getElementById("rangeSelector");
    container.innerHTML = "";

    Object.keys(DATA).forEach(range => {
        const div = document.createElement("div");
        div.className = "rangeCard";
        div.innerHTML = `<h3>${range}</h3>`;
        div.onclick = () => openRange(range);
        container.appendChild(div);
    });
}

/* ================= OPEN ================= */
function openRange(range) {
    activeRange = range;

    document.getElementById("rangeSelector").style.display = "none";
    document.getElementById("catalogue").style.display = "block";

    buildFamilyDropdown();
}

/* ================= BACK ================= */
document.getElementById("backBtn").onclick = () => {
    document.getElementById("catalogue").style.display = "none";
    document.getElementById("rangeSelector").style.display = "flex";
};

/* ================= FAMILY ================= */
function buildFamilyDropdown() {
    const dropdown = document.getElementById("familyDropdown");

    const families = [
        ...new Set(DATA[activeRange].primary.map(i => i.family))
    ];

    dropdown.innerHTML = "<option value=''>Select Family</option>";

    families.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        dropdown.appendChild(opt);
    });

    document.getElementById("variantDropdown").disabled = true;
    document.getElementById("trocarDropdown").disabled = true;
}

/* ================= FAMILY CHANGE ================= */
familyDropdown.onchange = e => {
    selectedFamily = e.target.value;
    selectedVariant = null;
    selectedTrocars = [];

    buildVariantDropdown();

    variantDropdown.disabled = false;
    trocarDropdown.disabled = true;

    renderSummary();
};

/* ================= VARIANT ================= */
function buildVariantDropdown() {
    const variants = [
        ...new Set(
            DATA[activeRange].primary
                .filter(i => i.family === selectedFamily)
                .map(i => i.variant)
        )
    ];

    variantDropdown.innerHTML = "<option value=''>Select Variant</option>";

    variants.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        variantDropdown.appendChild(opt);
    });
}

/* ================= VARIANT CHANGE ================= */
variantDropdown.onchange = e => {
    selectedVariant = e.target.value;
    selectedTrocars = [];

    buildTrocarDropdown();

    trocarDropdown.disabled = false;

    renderSummary();
};

/* ================= TROCAR ================= */
function buildTrocarDropdown() {
    const trocars = DATA[activeRange].secondary.filter(t =>
        t.family === selectedFamily
    );

    trocarDropdown.innerHTML = "";

    trocars.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.part_no;
        opt.textContent = t.part_no;
        trocarDropdown.appendChild(opt);
    });
}

/* ================= TROCAR CHANGE ================= */
trocarDropdown.onchange = e => {
    selectedTrocars = Array.from(e.target.selectedOptions)
        .map(o => o.value);

    renderSummary();
};

/* ================= SUMMARY ================= */
function renderSummary() {
    document.getElementById("selectionSummary").innerHTML = `
        <div><strong>Family:</strong> ${selectedFamily || "-"}</div>
        <div><strong>Variant:</strong> ${selectedVariant || "-"}</div>
        <div><strong>Trocars:</strong> ${selectedTrocars.join(", ") || "-"}</div>
    `;
}

/* ================= INIT ================= */
loadData();

</script>

</body>
</html>
