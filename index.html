<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YelloPort Catalogue</title>

<style>
body {
  font-family: Arial;
  background:#ffffff;
  margin:0;
  padding:20px;
  color:#0f172a;
}

h1{
  text-align:center;
  color:#1F8A86;
  margin-bottom:20px;
}

#rangeSelector{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.rangeCard{
  background:#fff;
  border-radius:12px;
  padding:20px;
  border:2px solid #1F8A86;
  cursor:pointer;
  text-align:center;
  width:220px;
  transition:0.2s;
}

.rangeCard:hover{
  background:#f1f5f9;
  transform:scale(1.05);
}

#configCard{
  border-style:dashed;
}

#backBtn{
  margin-bottom:15px;
  padding:10px 16px;
  background:#1F8A86;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

select{
  padding:10px;
  border-radius:8px;
  border:2px solid #1F8A86;
  width:320px;
  max-width:100%;
  margin-top:10px;
}

#familyImage{
  display:block;
  margin:20px auto;
  max-width:320px;
}

.table-wrapper{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  background:#1F8A86;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

td img{
  width:80px;
  height:60px;
  object-fit:contain;
}

/* MOBILE */
@media(max-width:768px){
  #rangeSelector{
    flex-direction:column;
    align-items:center;
  }

  .rangeCard{
    width:90%;
  }

  select{
    width:100%;
  }
}
</style>
</head>

<body>

<h1>Select YelloPort Range</h1>

<div id="rangeSelector"></div>

<div id="catalogue" style="display:none;">

<button id="backBtn">← Back</button>

<div style="text-align:center;">
<select id="familyDropdown"></select>
</div>

<img id="familyImage">

<!-- YELLOPORT TABLES -->
<div id="yelloportTables">

<h2>Cannulas</h2>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Image</th>
<th>Description</th>
<th>Part Number</th>
</tr>
</thead>
<tbody id="cannulaTable"></tbody>
</table>
</div>

<h2>Trocars</h2>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Image</th>
<th>Description</th>
<th>Part Number</th>
</tr>
</thead>
<tbody id="trocarTable"></tbody>
</table>
</div>

</div>

<!-- LOGIC TABLE -->
<div id="logicTableWrapper" style="display:none;">

<h2>Logic Instruments</h2>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Image</th>
<th>Variant</th>
<th>Type</th>
<th>Part Number</th>
</tr>
</thead>
<tbody id="logicTable"></tbody>
</table>
</div>

</div>

</div>

<script>

let DATA = {};
let activeRange = null;

/* LOAD JSON */
async function loadData(){
  try{
    const res = await fetch("YP.json");
    DATA = await res.json();
    initUI();
  }catch(e){
    console.error("JSON LOAD ERROR", e);
  }
}

/* INIT RANGE CARDS */
function initUI(){

  const container = document.getElementById("rangeSelector");
  container.innerHTML = "";

  // CONFIG
  const config = document.createElement("div");
  config.className = "rangeCard";
  config.id = "configCard";
  config.innerHTML = "<h3>⚙ Build a Set</h3>";
  config.onclick = ()=> window.location.href = "SetBuild.html";
  container.appendChild(config);

  // LOGIC BUTTON ✅
  if(DATA.Logic){
    const logic = document.createElement("div");
    logic.className = "rangeCard";
    logic.innerHTML = "<h3>Logic Instruments</h3>";
    logic.onclick = ()=> openLogic();
    container.appendChild(logic);
  }

  // YELLOPORT RANGES
  const ranges = [...new Set(DATA.cannulas.map(x=>x.range))];

  ranges.forEach(r=>{
    const div = document.createElement("div");
    div.className="rangeCard";
    div.innerHTML=`<h3>${r}</h3>`;
    div.onclick=()=>openRange(r);
    container.appendChild(div);
  });
}

/* OPEN YELLOPORT */
function openRange(range){
  activeRange = range;

  document.getElementById("rangeSelector").style.display="none";
  document.getElementById("catalogue").style.display="block";

  document.getElementById("yelloportTables").style.display="block";
  document.getElementById("logicTableWrapper").style.display="none";

  buildDropdown();
}

/* OPEN LOGIC */
function openLogic(){

  document.getElementById("rangeSelector").style.display="none";
  document.getElementById("catalogue").style.display="block";

  document.getElementById("yelloportTables").style.display="none";
  document.getElementById("logicTableWrapper").style.display="block";

  buildLogicDropdown();
}

/* BACK */
document.getElementById("backBtn").onclick=()=>{
  document.getElementById("catalogue").style.display="none";
  document.getElementById("rangeSelector").style.display="flex";
};

/* YELLOPORT DROPDOWN */
function buildDropdown(){

  const families = [...new Set(
    DATA.cannulas
      .filter(x=>x.range===activeRange)
      .map(x=>x.family)
  )];

  const dropdown = document.getElementById("familyDropdown");
  dropdown.innerHTML="";

  families.forEach(f=>{
    const opt = document.createElement("option");
    opt.value=f;
    opt.textContent=f;
    dropdown.appendChild(opt);
  });

  renderFamily(families[0]);
}

/* CHANGE FAMILY */
document.getElementById("familyDropdown").onchange = (e)=>{
  if(document.getElementById("logicTableWrapper").style.display==="block"){
    renderLogic(e.target.value);
  }else{
    renderFamily(e.target.value);
  }
};

/* RENDER YELLOPORT */
function renderFamily(family){

  const cannulas = DATA.cannulas.filter(x=>x.range===activeRange && x.family===family);
  const trocars = DATA.trocars.filter(x=>x.range===activeRange && x.family===family);

  document.getElementById("familyImage").src =
    cannulas[0]?.family_image || "";

  renderCannulas(cannulas);
  renderTrocars(trocars);
}

/* RENDER CANNULAS */
function renderCannulas(list){
  const table = document.getElementById("cannulaTable");
  table.innerHTML="";

  list.forEach(i=>{
    table.innerHTML+=`
      <tr>
        <td><img src="${i.variant_image || ''}"></td>
        <td>${i.family} - ${i.variant}</td>
        <td>${i.part_no}</td>
      </tr>
    `;
  });
}

/* RENDER TROCAR */
function renderTrocars(list){
  const table = document.getElementById("trocarTable");
  table.innerHTML="";

  list.forEach(i=>{
    table.innerHTML+=`
      <tr>
        <td><img src="${i.variant_image || ''}"></td>
        <td>${i.variant}</td>
        <td>${i.part_no}</td>
      </tr>
    `;
  });
}

/* ================= LOGIC FIX ================= */

/* BUILD LOGIC DROPDOWN */
function buildLogicDropdown(){

  const families = [...new Set(
    DATA.Logic.map(x => (x.family || "").trim())
  )];

  const dropdown = document.getElementById("familyDropdown");
  dropdown.innerHTML = "";

  families.forEach(f=>{
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    dropdown.appendChild(opt);
  });

  renderLogic(families[0]);
}

/* RENDER LOGIC */
function renderLogic(family){

  const items = DATA.Logic.filter(x => x.family === family);

  document.getElementById("familyImage").src =
    items.find(i => i.variant_image)?.variant_image || "";

  const table = document.getElementById("logicTable");
  table.innerHTML = "";

  items.forEach(i=>{
    table.innerHTML += `
      <tr>
        <td><img src="${i.variant_image || ''}"></td>
        <td>${i.variant || ''}</td>
        <td>${i.type || ''}</td>
        <td>${i.part_no || ''}</td>
      </tr>
    `;
  });
}

/* INIT */
loadData();

</script>

</body>
</html>
